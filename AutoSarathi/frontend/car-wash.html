<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Car Wash - AutoSarthi</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="autosarthi.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>

<nav class="navbar">
  <a href="home.html" class="logo"><i class="fa-solid fa-car-side"></i> AutoSarthi</a>
  <div class="nav-links">
    <a href="home.html">Home</a>
    <a href="car-wash.html" style="color:var(--mint)">Car Wash</a>
    <a href="auto-services.html">Auto Services</a>
    <a href="#">Nearby</a>
  </div>
  <div class="nav-right">
    <a href="login.html" class="nav-btn">Login</a>
    <a href="register.html" class="nav-btn register">Register</a>
  </div>
  <div class="menu-toggle" onclick="toggleSidebar()"><i class="fa-solid fa-bars"></i></div>
</nav>
<div class="sidebar" id="sidebar">
  <a href="home.html">Home</a>
  <a href="car-wash.html">Car Wash</a>
  <a href="auto-services.html">Auto Services</a>
  <a href="login.html">Login</a>
  <a href="register.html">Register</a>
</div>

<div class="page-header">
  <h1><i class="fa-solid fa-water"></i> Car Wash Services</h1>
  <p>Find professional car wash services near your location</p>
</div>

<div style="max-width:560px;margin:-20px auto 0;padding:0 1.5rem;">
  <div class="search-box">
    <i class="fa-solid fa-magnifying-glass"></i>
    <input type="text" id="searchInput" placeholder="Search by city (e.g. Pune, Ravet, Kothrud...)">
    <i class="fa-solid fa-location-crosshairs" style="color:var(--forest-light);cursor:pointer;" title="Use my location"></i>
  </div>
</div>

<div style="max-width:1200px;margin:16px auto 0;padding:0 1.5rem;display:flex;align-items:center;justify-content:space-between;">
  <div id="resultCount" style="font-size:13px;color:var(--text-muted);"></div>
</div>

<div id="serviceContainer" class="service-grid"></div>

<script>
let allServices = [];

function displayServices(data) {
  const container = document.getElementById("serviceContainer");
  const count = document.getElementById("resultCount");
  container.innerHTML = "";

  if (!Array.isArray(data) || data.length === 0) {
    container.innerHTML = `<div class="empty-state"><i class="fa-solid fa-droplet-slash"></i><p>No car wash services found in this area.</p></div>`;
    count.textContent = "";
    return;
  }

  count.textContent = `${data.length} service${data.length !== 1 ? 's' : ''} found`;

  data.forEach(service => {
    container.innerHTML += `
      <div class="service-card">
        <div class="service-card-header">
          <div class="garage-name"><i class="fa-solid fa-warehouse"></i>${service.garageName}</div>
          <span class="badge badge-wash"><i class="fa-solid fa-water"></i> Car Wash</span>
        </div>
        <div class="service-card-body">
          <div class="service-location"><i class="fa-solid fa-location-dot"></i>${service.city}</div>
          <div class="service-title">${service.serviceName}</div>
          <div class="service-desc">${service.description}</div>
          <div class="service-price">₹${service.price} <span>per wash</span></div>
        </div>
        <div class="service-card-footer">
          <a href="tel:${service.phone}" class="btn btn-primary" style="flex:1;justify-content:center;">
            <i class="fa-solid fa-phone"></i> Call
          </a>
          <a href="https://wa.me/${service.phone}" target="_blank" class="btn btn-whatsapp" style="flex:1;justify-content:center;">
            <i class="fa-brands fa-whatsapp"></i> WhatsApp
          </a>
        </div>
      </div>`;
  });
}

fetch("http://localhost:8080/api/public/car-wash-services")
  .then(res => res.json())
  .then(data => { allServices = data; displayServices(allServices); })
  .catch(() => {
    document.getElementById("serviceContainer").innerHTML =
      `<div class="empty-state"><i class="fa-solid fa-triangle-exclamation"></i><p>Unable to load services. Please try again.</p></div>`;
  });

document.getElementById("searchInput").addEventListener("input", function() {
  const val = this.value.toLowerCase();
  displayServices(allServices.filter(s => s.city.toLowerCase().includes(val)));
});

function toggleSidebar() { document.getElementById("sidebar").classList.toggle("active"); }
</script>
</body>
</html>
