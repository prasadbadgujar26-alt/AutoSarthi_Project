<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Login - AutoSarthi</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="autosarthi.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    body { background: var(--forest); display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; padding: 24px; }
    body::before {
      content: '';
      position: fixed; inset: 0;
      background: radial-gradient(ellipse 70% 50% at 50% 100%, rgba(94,255,198,0.15) 0%, transparent 60%);
      pointer-events: none;
    }

    .auth-brand {
      font-family: var(--font-display); font-size: 26px; font-weight: 800;
      color: white; margin-bottom: 32px; display: flex; align-items: center; gap: 10px;
    }
    .auth-brand i { color: var(--mint); }

    .auth-card {
      width: 100%; max-width: 400px;
      background: white; border-radius: var(--radius-xl);
      padding: 36px; box-shadow: 0 32px 80px rgba(0,0,0,0.35);
      position: relative;
    }
    .auth-card-title {
      font-family: var(--font-display); font-size: 26px; font-weight: 800;
      color: var(--text-primary); margin-bottom: 4px; letter-spacing: -0.5px;
    }
    .auth-card-sub { font-size: 14px; color: var(--text-muted); margin-bottom: 28px; }

    .input-group { position: relative; }
    .input-group .input-icon {
      position: absolute; left: 13px; top: 50%; transform: translateY(-50%);
      color: var(--text-muted); font-size: 14px; pointer-events: none;
    }
    .input-group .form-control { padding-left: 38px; }

    .form-footer { display: flex; align-items: center; justify-content: space-between; margin-top: 20px; }
    .form-footer a { font-size: 13px; color: var(--forest-light); text-decoration: none; font-weight: 500; }
    .form-footer a:hover { text-decoration: underline; }
    .auth-alt { text-align: center; margin-top: 24px; font-size: 14px; color: var(--text-secondary); }
    .auth-alt a { color: var(--forest); font-weight: 600; text-decoration: none; }
    .auth-alt a:hover { text-decoration: underline; }

    .divider-line { display: flex; align-items: center; gap: 12px; margin: 24px 0; }
    .divider-line span { font-size: 12px; color: var(--text-muted); white-space: nowrap; }
    .divider-line::before, .divider-line::after { content: ''; flex: 1; height: 1px; background: var(--border); }
  </style>
</head>
<body>

<div class="auth-brand"><i class="fa-solid fa-car-side"></i> AutoSarthi</div>

<div class="auth-card">
  <div class="auth-card-title">Welcome back</div>
  <div class="auth-card-sub">Sign in to manage your garage & services</div>

  <form id="loginForm">
    <div class="form-group">
      <label>Email address</label>
      <div class="input-group">
        <i class="fa-solid fa-envelope input-icon"></i>
        <input type="email" id="email" class="form-control" placeholder="you@example.com" required>
      </div>
    </div>
    <div class="form-group">
      <label>Password</label>
      <div class="input-group">
        <i class="fa-solid fa-lock input-icon"></i>
        <input type="password" id="password" class="form-control" placeholder="Enter your password" required>
      </div>
    </div>

    <div id="message"></div>

    <button type="submit" class="btn btn-primary btn-full" style="margin-top:8px;">
      Sign In <i class="fa-solid fa-arrow-right"></i>
    </button>
  </form>

  <div class="auth-alt">
    Don't have an account? <a href="register.html">Register your garage</a>
  </div>
</div>

<script>
document.getElementById("loginForm").addEventListener("submit", function(e) {
  e.preventDefault();
  const btn = this.querySelector('button[type="submit"]');
  btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Signing in...';
  btn.disabled = true;

  const loginData = {
    email: document.getElementById("email").value,
    password: document.getElementById("password").value
  };

  fetch("http://localhost:8080/api/mechanics/login", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify(loginData)
  })
  .then(response => {
    if (!response.ok) throw new Error("Invalid credentials");
    return response.text();
  })
  .then(token => {
    localStorage.setItem("token", token);
    window.location.href = "home.html";
  })
  .catch(() => {
    document.getElementById("message").innerHTML = `<div class="alert alert-error"><i class="fa-solid fa-circle-exclamation"></i> Invalid email or password.</div>`;
    btn.innerHTML = 'Sign In <i class="fa-solid fa-arrow-right"></i>';
    btn.disabled = false;
  });
});
</script>
</body>
</html>
