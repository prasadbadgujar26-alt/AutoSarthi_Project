<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Register - AutoSarthi</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="autosarthi.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    body { background: var(--forest); display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; padding: 32px 24px; }
    body::before {
      content: ''; position: fixed; inset: 0;
      background: radial-gradient(ellipse 70% 50% at 50% 100%, rgba(94,255,198,0.15) 0%, transparent 60%);
      pointer-events: none;
    }
    .auth-brand {
      font-family: var(--font-display); font-size: 26px; font-weight: 800;
      color: white; margin-bottom: 28px; display: flex; align-items: center; gap: 10px;
    }
    .auth-brand i { color: var(--mint); }
    .auth-card {
      width: 100%; max-width: 480px;
      background: white; border-radius: var(--radius-xl);
      padding: 36px; box-shadow: 0 32px 80px rgba(0,0,0,0.35);
    }
    .auth-card-title { font-family: var(--font-display); font-size: 24px; font-weight: 800; color: var(--text-primary); margin-bottom: 4px; letter-spacing: -0.5px; }
    .auth-card-sub { font-size: 14px; color: var(--text-muted); margin-bottom: 28px; }

    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
    .input-group { position: relative; }
    .input-group .input-icon { position: absolute; left: 13px; top: 50%; transform: translateY(-50%); color: var(--text-muted); font-size: 14px; pointer-events: none; }
    .input-group .form-control { padding-left: 38px; }

    .auth-alt { text-align: center; margin-top: 20px; font-size: 14px; color: var(--text-secondary); }
    .auth-alt a { color: var(--forest); font-weight: 600; text-decoration: none; }
    .auth-alt a:hover { text-decoration: underline; }

    @media(max-width: 480px) { .form-row { grid-template-columns: 1fr; } }
  </style>
</head>
<body>

<div class="auth-brand"><i class="fa-solid fa-car-side"></i> AutoSarthi</div>

<div class="auth-card">
  <div class="auth-card-title">Register Your Garage</div>
  <div class="auth-card-sub">Join hundreds of garages already on AutoSarthi</div>

  <form id="registrationForm">
    <div class="form-row">
      <div class="form-group">
        <label>Garage Name</label>
        <div class="input-group">
          <i class="fa-solid fa-warehouse input-icon"></i>
          <input type="text" id="garageName" class="form-control" placeholder="e.g. Raj Auto Works" required>
        </div>
      </div>
      <div class="form-group">
        <label>Owner Name</label>
        <div class="input-group">
          <i class="fa-solid fa-user input-icon"></i>
          <input type="text" id="ownerName" class="form-control" placeholder="Your full name" required>
        </div>
      </div>
    </div>

    <div class="form-group">
      <label>Email Address</label>
      <div class="input-group">
        <i class="fa-solid fa-envelope input-icon"></i>
        <input type="email" id="email" class="form-control" placeholder="you@example.com" required>
      </div>
    </div>

    <div class="form-row">
      <div class="form-group">
        <label>Phone Number</label>
        <div class="input-group">
          <i class="fa-solid fa-phone input-icon"></i>
          <input type="text" id="phone" class="form-control" placeholder="10-digit number" required>
        </div>
      </div>
      <div class="form-group">
        <label>City</label>
        <div class="input-group">
          <i class="fa-solid fa-city input-icon"></i>
          <input type="text" id="city" class="form-control" placeholder="e.g. Pune" required>
        </div>
      </div>
    </div>

    <div class="form-group">
      <label>Specialization</label>
      <div class="input-group">
        <i class="fa-solid fa-screwdriver-wrench input-icon"></i>
        <input type="text" id="specialization" class="form-control" placeholder="e.g. Car Wash, Engine Repair" required>
      </div>
    </div>

    <div class="form-row">
      <div class="form-group">
        <label>Password</label>
        <div class="input-group">
          <i class="fa-solid fa-lock input-icon"></i>
          <input type="password" id="password" class="form-control" placeholder="Create password" required>
        </div>
      </div>
      <div class="form-group">
        <label>Confirm Password</label>
        <div class="input-group">
          <i class="fa-solid fa-lock input-icon"></i>
          <input type="password" id="confirmPassword" class="form-control" placeholder="Repeat password" required>
        </div>
      </div>
    </div>

    <div id="message"></div>

    <button type="submit" class="btn btn-primary btn-full" style="margin-top:8px;">
      Create Account <i class="fa-solid fa-arrow-right"></i>
    </button>
  </form>

  <div class="auth-alt">Already registered? <a href="login.html">Sign in</a></div>
</div>

<script>
document.getElementById("registrationForm").addEventListener("submit", function(e) {
  e.preventDefault();
  const msg = document.getElementById("message");
  const btn = this.querySelector('button[type="submit"]');

  if (document.getElementById("password").value !== document.getElementById("confirmPassword").value) {
    msg.innerHTML = `<div class="alert alert-error"><i class="fa-solid fa-circle-exclamation"></i> Passwords do not match.</div>`;
    return;
  }

  btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Creating account...';
  btn.disabled = true;

  const mechanicData = {
    garageName: document.getElementById("garageName").value,
    ownerName: document.getElementById("ownerName").value,
    email: document.getElementById("email").value,
    phone: document.getElementById("phone").value,
    city: document.getElementById("city").value,
    specialization: document.getElementById("specialization").value,
    password: document.getElementById("password").value
  };

  fetch("http://localhost:8080/api/mechanics/register", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify(mechanicData)
  })
  .then(response => {
    if (!response.ok) return response.text().then(t => { throw new Error(t); });
    return response.json();
  })
  .then(() => {
    msg.innerHTML = `<div class="alert alert-success"><i class="fa-solid fa-circle-check"></i> Registration successful! <a href="login.html">Sign in now</a>.</div>`;
    btn.innerHTML = 'Create Account <i class="fa-solid fa-arrow-right"></i>';
    btn.disabled = false;
  })
  .catch(error => {
    msg.innerHTML = `<div class="alert alert-error"><i class="fa-solid fa-circle-exclamation"></i> ${error.message}</div>`;
    btn.innerHTML = 'Create Account <i class="fa-solid fa-arrow-right"></i>';
    btn.disabled = false;
  });
});
</script>
</body>
</html>
